<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local PDF Merger</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: #333; margin-bottom: 1.5rem; }
        .input-group { margin-bottom: 1.2rem; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; color: #555; }
        input[type="file"] { width: 100%; }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
            margin-top: 1rem;
            transition: background 0.2s;
        }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #status { margin-top: 1rem; font-size: 0.9rem; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h2>PDF Merger</h2>
    <div class="input-group">
        <label>First PDF (Pages 1-N)</label>
        <input type="file" id="file1" accept=".pdf">
    </div>
    <div class="input-group">
        <label>Second PDF (Appended to end)</label>
        <input type="file" id="file2" accept=".pdf">
    </div>
    <button id="mergeBtn">Merge & Save</button>
    <div id="status">Ready. Processing is 100% local.</div>
</div>

<script>
    const { PDFDocument } = PDFLib;

    async function mergePdfs() {
        const file1Input = document.getElementById('file1').files[0];
        const file2Input = document.getElementById('file2').files[0];
        const status = document.getElementById('status');
        const btn = document.getElementById('mergeBtn');

        if (!file1Input || !file2Input) {
            alert("Please select two PDF files first!");
            return;
        }

        try {
            btn.disabled = true;
            status.innerText = "Processing locally...";

            // Read files as ArrayBuffers
            const pdf1Bytes = await file1Input.arrayBuffer();
            const pdf2Bytes = await file2Input.arrayBuffer();

            // Create a new PDF document
            const mergedPdf = await PDFDocument.create();

            // Load the two PDFs
            const pdf1 = await PDFDocument.load(pdf1Bytes);
            const pdf2 = await PDFDocument.load(pdf2Bytes);

            // Copy pages from PDF 1
            const pages1 = await mergedPdf.copyPages(pdf1, pdf1.getPageIndices());
            pages1.forEach(page => mergedPdf.addPage(page));

            // Copy pages from PDF 2
            const pages2 = await mergedPdf.copyPages(pdf2, pdf2.getPageIndices());
            pages2.forEach(page => mergedPdf.addPage(page));

            // Serialize the PDF to bytes
            const mergedPdfBytes = await mergedPdf.save();

            // Trigger the download/save dialog
            download(mergedPdfBytes, "merged_document.pdf", "application/pdf");
            
            status.innerText = "Done! File saved.";
            btn.disabled = false;
        } catch (err) {
            console.error(err);
            status.innerText = "Error merging files. Check console.";
            btn.disabled = false;
        }
    }

    // Helper function to trigger browser download dialog
    function download(data, filename, type) {
        const file = new Blob([data], { type: type });
        const a = document.createElement("a");
        const url = URL.createObjectURL(file);
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        setTimeout(() => {
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }, 0);
    }

    document.getElementById('mergeBtn').addEventListener('click', mergePdfs);
</script>

</body>
</html>
